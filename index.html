<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#8b1d2c">
  <meta name="description" content="Nimbus Travel multilingual tourist feedback survey">
  <title>Nimbus Travel · Tourist Feedback</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .landing-logo{width:min(360px,78vw)!important;height:auto!important;border-radius:0!important;background:transparent!important;box-shadow:none!important;padding:0!important;filter:drop-shadow(0 15px 26px rgba(35,0,8,.22))}
    .landing h1{margin-top:24px!important}
    .mini-brand img{width:180px!important;height:auto!important;border-radius:0!important;background:transparent!important}
    .mini-brand div{display:none!important}
    @media(max-width:680px){.landing-logo{width:min(310px,84vw)!important}.mini-brand img{width:138px!important}}
  </style>
</head>
<body>
  <section id="landing" class="landing" aria-labelledby="welcomeTitle">
    <div class="sun"></div><div class="mountains"></div>
    <div class="landing-card">
      <img class="landing-logo" src="assets/logo.svg" alt="Nimbus Travel">
      <p class="welcome-en">WELCOME TO CHINA</p>
      <h1 id="welcomeTitle">欢迎来到中国</h1>
      <p class="landing-note">Please choose your language to share your travel experience.<br>请选择语言，填写本次中国之旅的评价。</p>
      <div class="language-grid" role="group" aria-label="Choose language">
        <button class="language-card" type="button" data-open-lang="zh"><span class="flag">🇨🇳</span><span><strong>中文</strong><small>CHINESE</small></span></button>
        <button class="language-card" type="button" data-open-lang="en"><span class="flag">🌐</span><span><strong>English</strong><small>ENGLISH</small></span></button>
        <button class="language-card" type="button" data-open-lang="ru"><span class="flag">🇷🇺</span><span><strong>Русский</strong><small>RUSSIAN</small></span></button>
        <button class="language-card" type="button" data-open-lang="es"><span class="flag">🇪🇸</span><span><strong>Español</strong><small>SPANISH</small></span></button>
      </div>
      <div class="landing-foot">Nimbus Travel · China Inbound Services</div>
    </div>
  </section>

  <div id="formPage" class="form-page hidden">
    <header class="hero">
      <div class="topbar">
        <div class="mini-brand"><img src="assets/logo.svg" alt="Nimbus Travel"><div><strong>NIMBUS TRAVEL</strong><small>CHINA INBOUND SERVICES</small></div></div>
        <div class="top-actions">
          <button id="backButton" class="back" type="button" data-t="back">← Language</button>
          <button class="lang-mini" type="button" data-lang="zh">中</button><button class="lang-mini" type="button" data-lang="en">EN</button><button class="lang-mini" type="button" data-lang="ru">RU</button><button class="lang-mini" type="button" data-lang="es">ES</button>
        </div>
      </div>
      <div class="hero-copy"><p data-t="eyebrow"></p><h1 data-t="title"></h1><p class="intro" data-t="intro"></p></div>
    </header>

    <main class="wrap">
      <form id="surveyForm" class="card" novalidate>
        <input class="honeypot" name="website" tabindex="-1" autocomplete="off">
        <section class="section"><div class="section-head"><span class="section-number">01</span><div><h2 data-t="trip"></h2><p data-t="tripHelp"></p></div></div><div class="grid">
          <div class="field"><label><span data-t="group"></span><span class="required">*</span></label><input name="groupCode" maxlength="80" required><p class="error" data-error="groupCode"></p></div>
          <div class="field"><label><span data-t="name"></span><span class="required">*</span></label><input name="name" maxlength="120" autocomplete="name" required><p class="error" data-error="name"></p></div>
          <div class="field wide"><label><span data-t="cities"></span><span class="required">*</span></label><input name="ciudades" maxlength="240" required><p class="error" data-error="ciudades"></p></div>
          <div class="field wide"><label><span data-t="itinerary"></span><span class="required">*</span></label><input name="itinerario" maxlength="300" required><p class="error" data-error="itinerario"></p></div>
          <div class="field wide"><label data-t="spots"></label><input name="puntosEscenicos" maxlength="400"></div>
        </div></section>
        <section class="section"><div class="section-head"><span class="section-number">02</span><div><h2 data-t="service"></h2><p data-t="ratingHelp"></p></div></div><div id="ratings" class="ratings"></div></section>
        <section class="section"><div class="section-head"><span class="section-number">03</span><div><h2 data-t="commentsTitle"></h2><p data-t="commentsHelp"></p></div></div><div class="field"><textarea id="comments" name="comentarios" maxlength="2000"></textarea><div class="counter"><span id="count">0</span>/2000</div></div><label class="consent"><input id="consent" type="checkbox"><span data-t="consent"></span></label><p class="error" data-error="consent"></p><button id="submitButton" class="submit" type="submit" data-t="submit"></button><p class="privacy" data-t="privacy"></p><div id="message" class="message" role="status"></div></section>
      </form>
      <section id="success" class="card success"><div class="success-icon">✓</div><h2 data-t="successTitle"></h2><p data-t="successText"></p><button id="again" class="again" type="button" data-t="again"></button></section>
    </main>
    <footer class="site-foot">© <span id="year"></span> Nimbus Travel China</footer>
  </div>

<script src="js/app.js"></script>
</body>
</html>

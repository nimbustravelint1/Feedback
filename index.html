<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#8f1d2c">
<title>Nimbus Travel Feedback</title>
<style>
:root{--red:#8f1d2c;--deep:#4a0d16;--gold:#e4c47b;--cream:#fbf6ec;--ink:#211b1a;--muted:#756b66;--line:#eadfd1;--danger:#b42318;--ok:#1f704a}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(180deg,#f4eadb 0,#fbf7ef 32%,#f5efe6 100%);color:var(--ink);font-family:Inter,"Noto Sans SC","Microsoft YaHei",Arial,sans-serif}.hero{position:relative;min-height:430px;overflow:hidden;color:#fff;background:linear-gradient(125deg,#4a0d16,#8f1d2c 58%,#ba3843)}.hero:before{content:"";position:absolute;inset:0;opacity:.16;background-image:linear-gradient(30deg,rgba(255,255,255,.07) 12%,transparent 12.5%,transparent 87%,rgba(255,255,255,.07) 87.5%),linear-gradient(150deg,rgba(255,255,255,.07) 12%,transparent 12.5%,transparent 87%,rgba(255,255,255,.07) 87.5%);background-size:44px 76px}.top{position:relative;z-index:2;width:min(1080px,calc(100% - 32px));margin:auto;padding:24px 0;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:12px}.mark{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;background:#fff;color:#1671a8;box-shadow:0 8px 25px rgba(35,0,7,.25);font-weight:900;font-size:12px;line-height:.9;text-align:center}.mark span{display:block;color:#e0ad17;font-size:8px;letter-spacing:.12em}.brandcopy strong{display:block;font-size:19px;letter-spacing:.08em}.brandcopy small{display:block;margin-top:5px;color:var(--gold);font-size:9px;letter-spacing:.18em}.langs{display:flex;gap:4px;padding:5px;border:1px solid rgba(255,255,255,.22);border-radius:999px;background:rgba(52,4,13,.35)}.langs button{height:35px;min-width:43px;padding:0 10px;border:0;border-radius:999px;background:transparent;color:rgba(255,255,255,.78);font-weight:800;cursor:pointer}.langs button.active{background:#fff7e8;color:var(--deep)}.headline{position:relative;z-index:2;width:min(1080px,calc(100% - 32px));margin:44px auto 0}.eyebrow{margin:0 0 12px;color:var(--gold);font-size:12px;font-weight:800;letter-spacing:.18em}.headline h1{max-width:700px;margin:0;font-family:Georgia,"Noto Serif SC",serif;font-size:clamp(38px,6vw,66px);line-height:1.04}.intro{max-width:640px;margin:18px 0 0;color:rgba(255,255,255,.86);font-size:17px;line-height:1.7}.wall{position:absolute;right:-80px;bottom:-40px;width:650px;height:245px;opacity:.32}.wrap{width:min(920px,calc(100% - 28px));margin:-55px auto 70px;position:relative;z-index:4}.card{padding:clamp(22px,4vw,46px);background:rgba(255,253,248,.98);border:1px solid rgba(255,255,255,.7);border-radius:28px;box-shadow:0 24px 70px rgba(69,25,20,.15)}.section{padding:5px 0 34px}.section+.section{padding-top:34px;border-top:1px solid var(--line)}.sectionhead{display:flex;gap:15px;margin-bottom:25px}.num{flex:0 0 42px;height:42px;border-radius:13px;display:grid;place-items:center;background:#f5e6d3;color:var(--red);font-weight:900}.sectionhead h2{margin:1px 0 5px;font-size:23px}.sectionhead p{margin:0;color:var(--muted);line-height:1.5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:19px}.wide{grid-column:1/-1}.field label,.rating-title{display:block;margin-bottom:8px;font-weight:800}.req{color:var(--red);margin-left:4px}.field input,.field textarea{width:100%;border:1px solid #d9cab9;border-radius:13px;background:#fff;padding:13px 14px;color:var(--ink);outline:none;transition:.15s}.field input:focus,.field textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(143,29,44,.11)}.field textarea{min-height:125px;resize:vertical}.ratings{display:grid;gap:14px}.rating{display:grid;grid-template-columns:minmax(220px,1fr) auto;align-items:center;gap:20px;padding:17px 18px;border:1px solid var(--line);border-radius:16px;background:#fff}.rating small{display:block;margin-top:4px;color:var(--muted);font-weight:400}.stars{display:flex;flex-direction:row-reverse;justify-content:flex-end}.stars input{position:absolute;opacity:0;pointer-events:none}.stars label{padding:0 3px;color:#d7cec4;font-size:31px;cursor:pointer;transition:.12s}.stars input:checked~label,.stars label:hover,.stars label:hover~label{color:#e1ad2d;transform:translateY(-1px)}.error{min-height:18px;margin:5px 0 0;color:var(--danger);font-size:12px}.count{text-align:right;color:var(--muted);font-size:12px}.consent{display:flex;align-items:flex-start;gap:10px;margin-top:18px;color:var(--muted);font-size:13px;line-height:1.55}.consent input{margin-top:3px}.submit{width:100%;margin-top:22px;padding:15px 18px;border:0;border-radius:14px;background:linear-gradient(135deg,var(--deep),var(--red));color:#fff;font-weight:900;font-size:16px;cursor:pointer;box-shadow:0 12px 28px rgba(143,29,44,.23)}.submit:disabled{opacity:.55;cursor:wait}.message{display:none;margin-top:14px;padding:12px 14px;border-radius:12px;font-size:14px}.message.show{display:block}.message.bad{background:#fff0ee;color:var(--danger)}.message.good{background:#eaf8f1;color:var(--ok)}.success{display:none;text-align:center;padding:46px 25px}.success.show{display:block}.success-icon{width:70px;height:70px;margin:0 auto 18px;border-radius:50%;display:grid;place-items:center;background:#e8f5ee;color:var(--ok);font-size:35px}.success h2{font-size:29px}.success p{color:var(--muted);line-height:1.65}.again{padding:12px 18px;border:1px solid var(--red);border-radius:12px;background:#fff;color:var(--red);font-weight:800;cursor:pointer}.foot{text-align:center;color:#8a7d76;font-size:12px;padding:0 20px 28px}.honeypot{position:absolute!important;left:-9999px!important}@media(max-width:700px){.hero{min-height:480px}.brandcopy{display:none}.langs{display:grid;grid-template-columns:repeat(2,1fr);border-radius:16px}.headline{margin-top:35px}.wall{right:-280px}.wrap{margin-top:-38px}.card{border-radius:22px}.grid{grid-template-columns:1fr}.wide{grid-column:auto}.rating{grid-template-columns:1fr;gap:9px}.stars label{font-size:36px}.sectionhead h2{font-size:20px}}
</style>
</head>
<body>
<header class="hero">
<div class="top">
<div class="brand"><div class="mark">NIMBUS<span>TRAVEL</span></div><div class="brandcopy"><strong>NIMBUS TRAVEL</strong><small>CHINA INBOUND SERVICES</small></div></div>
<div class="langs" aria-label="Language"><button data-lang="zh">中文</button><button data-lang="en">EN</button><button data-lang="ru">RU</button><button data-lang="es">ES</button></div>
</div>
<div class="headline"><p class="eyebrow" data-t="eyebrow"></p><h1 data-t="title"></h1><p class="intro" data-t="intro"></p></div>
<svg class="wall" viewBox="0 0 700 260" aria-hidden="true"><path d="M20 215C95 170 150 171 224 197C291 220 335 214 397 177C465 137 521 145 586 186C625 211 658 215 690 199" fill="none" stroke="#ffe7ad" stroke-width="8" stroke-linecap="round"/><path d="M95 183v-35h42v31m114 18v-43h45v37m121-23v-48h47v41m95 27v-38h43v31" fill="none" stroke="#f7d276" stroke-width="7"/><path d="M90 149l26-19 27 19m103 6 28-22 28 22m110-34 29-23 29 23m85 29 25-19 27 19" fill="none" stroke="#ffe7ad" stroke-width="6"/></svg>
</header>
<main class="wrap">
<form id="form" class="card" novalidate>
<input class="honeypot" name="website" tabindex="-1" autocomplete="off">
<section class="section"><div class="sectionhead"><span class="num">01</span><div><h2 data-t="trip"></h2><p data-t="tripHelp"></p></div></div><div class="grid">
<div class="field"><label><span data-t="group"></span><span class="req">*</span></label><input name="groupCode" maxlength="80" required><p class="error" data-e="groupCode"></p></div>
<div class="field"><label><span data-t="name"></span><span class="req">*</span></label><input name="name" maxlength="120" autocomplete="name" required><p class="error" data-e="name"></p></div>
<div class="field wide"><label><span data-t="cities"></span><span class="req">*</span></label><input name="ciudades" maxlength="240" required><p class="error" data-e="ciudades"></p></div>
<div class="field wide"><label><span data-t="itinerary"></span><span class="req">*</span></label><input name="itinerario" maxlength="300" required><p class="error" data-e="itinerario"></p></div>
<div class="field wide"><label data-t="spots"></label><input name="puntosEscenicos" maxlength="400"></div>
</div></section>
<section class="section"><div class="sectionhead"><span class="num">02</span><div><h2 data-t="service"></h2><p data-t="ratingHelp"></p></div></div><div id="ratings" class="ratings"></div></section>
<section class="section"><div class="sectionhead"><span class="num">03</span><div><h2 data-t="commentsTitle"></h2><p data-t="commentsHelp"></p></div></div><div class="field"><textarea id="comments" name="comentarios" maxlength="2000"></textarea><div class="count"><span id="count">0</span>/2000</div></div><label class="consent"><input id="consent" type="checkbox"><span data-t="consent"></span></label><p class="error" data-e="consent"></p><button id="submit" class="submit" type="submit" data-t="submit"></button><div id="message" class="message"></div></section>
</form>
<section id="success" class="card success"><div class="success-icon">✓</div><h2 data-t="successTitle"></h2><p data-t="successText"></p><button id="again" class="again" data-t="again"></button></section>
</main>
<footer class="foot">© <span id="year"></span> Nimbus Travel China</footer>
<script>
const ENDPOINT='https://script.google.com/macros/s/AKfycbzsas2HkpF4G9IGP5y2biOwqfW4Quf5l0_Hh2U5d4D4SHr4aEW5prZJVN_trOqqtqOT/exec';
const I={
zh:{eyebrow:'您的旅程，我们用心',title:'中国之旅满意度调查',intro:'感谢您选择 Nimbus Travel。您的真实反馈将帮助我们持续提升在中国的旅行服务。',trip:'行程信息',tripHelp:'请填写您参加的团组和线路信息。',group:'团组编号',name:'姓名',cities:'游览城市',itinerary:'行程线路',spots:'主要景点',service:'服务评价',ratingHelp:'请选择一至五星，五星代表非常满意。',commentsTitle:'意见与建议',commentsHelp:'欢迎分享旅程亮点、建议或需要我们改进的地方。',consent:'我同意 Nimbus Travel 将本次反馈用于服务质量改进。',submit:'提交评价',sending:'正在提交…',successTitle:'感谢您的反馈',successText:'您的评价已经成功提交。祝您旅途愉快，期待再次与您相见。',again:'再填写一份',required:'请填写此项',ratingRequired:'请选择评分',consentRequired:'请勾选同意',network:'提交失败，请检查网络后重试。',hotelBreakfast:'酒店早餐',hotelFacilities:'酒店设施',hotelService:'酒店服务',restaurantQuality:'餐厅菜品质量',restaurantService:'餐厅服务',guideAttitude:'导游服务态度',overall:'总体满意度'},
en:{eyebrow:'YOUR JOURNEY, OUR CARE',title:'China Travel Satisfaction Survey',intro:'Thank you for travelling with Nimbus Travel. Your feedback helps us improve every journey in China.',trip:'Trip information',tripHelp:'Please tell us which group and itinerary you joined.',group:'Group code',name:'Name',cities:'Cities visited',itinerary:'Itinerary',spots:'Main scenic spots',service:'Service rating',ratingHelp:'Choose one to five stars. Five means excellent.',commentsTitle:'Comments and suggestions',commentsHelp:'Share your highlights, suggestions or areas where we can improve.',consent:'I agree that Nimbus Travel may use this feedback to improve service quality.',submit:'Submit feedback',sending:'Submitting…',successTitle:'Thank you for your feedback',successText:'Your response has been submitted successfully. We wish you a pleasant journey and hope to welcome you again.',again:'Submit another response',required:'This field is required',ratingRequired:'Please select a rating',consentRequired:'Please confirm your consent',network:'Submission failed. Please check your connection and try again.',hotelBreakfast:'Hotel breakfast',hotelFacilities:'Hotel facilities',hotelService:'Hotel service',restaurantQuality:'Restaurant food quality',restaurantService:'Restaurant service',guideAttitude:'Guide service attitude',overall:'Overall satisfaction'},
ru:{eyebrow:'ВАШЕ ПУТЕШЕСТВИЕ — НАША ЗАБОТА',title:'Оценка путешествия по Китаю',intro:'Благодарим вас за путешествие с Nimbus Travel. Ваш отзыв поможет нам сделать поездки по Китаю ещё лучше.',trip:'Информация о поездке',tripHelp:'Укажите группу и маршрут, в котором вы участвовали.',group:'Код группы',name:'Имя и фамилия',cities:'Посещённые города',itinerary:'Маршрут',spots:'Основные достопримечательности',service:'Оценка услуг',ratingHelp:'Поставьте от одной до пяти звёзд. Пять звёзд означает «отлично».',commentsTitle:'Комментарии и предложения',commentsHelp:'Расскажите, что вам понравилось и что мы можем улучшить.',consent:'Я согласен(на), что Nimbus Travel может использовать отзыв для повышения качества услуг.',submit:'Отправить отзыв',sending:'Отправка…',successTitle:'Спасибо за ваш отзыв',successText:'Ваш отзыв успешно отправлен. Желаем приятного путешествия и будем рады видеть вас снова.',again:'Заполнить ещё раз',required:'Заполните это поле',ratingRequired:'Поставьте оценку',consentRequired:'Подтвердите согласие',network:'Не удалось отправить отзыв. Проверьте интернет и повторите попытку.',hotelBreakfast:'Завтрак в отеле',hotelFacilities:'Инфраструктура отеля',hotelService:'Сервис в отеле',restaurantQuality:'Качество блюд в ресторане',restaurantService:'Сервис в ресторане',guideAttitude:'Работа и отношение гида',overall:'Общая удовлетворённость'},
es:{eyebrow:'SU VIAJE, NUESTRO CUIDADO',title:'Encuesta de satisfacción del viaje a China',intro:'Gracias por viajar con Nimbus Travel. Sus comentarios nos ayudan a mejorar cada experiencia en China.',trip:'Información del viaje',tripHelp:'Indique el grupo y el itinerario en el que participó.',group:'Código del grupo',name:'Nombre',cities:'Ciudades visitadas',itinerary:'Itinerario',spots:'Principales lugares turísticos',service:'Valoración del servicio',ratingHelp:'Seleccione de una a cinco estrellas. Cinco significa excelente.',commentsTitle:'Comentarios y sugerencias',commentsHelp:'Comparta los aspectos destacados, sugerencias o puntos que podemos mejorar.',consent:'Acepto que Nimbus Travel utilice estos comentarios para mejorar la calidad del servicio.',submit:'Enviar encuesta',sending:'Enviando…',successTitle:'Gracias por sus comentarios',successText:'Su encuesta se ha enviado correctamente. Le deseamos un buen viaje y esperamos volver a recibirle.',again:'Enviar otra respuesta',required:'Este campo es obligatorio',ratingRequired:'Seleccione una valoración',consentRequired:'Confirme su consentimiento',network:'No se pudo enviar. Revise la conexión e inténtelo de nuevo.',hotelBreakfast:'Desayuno del hotel',hotelFacilities:'Instalaciones del hotel',hotelService:'Servicio del hotel',restaurantQuality:'Calidad de la comida',restaurantService:'Servicio del restaurante',guideAttitude:'Actitud y servicio del guía',overall:'Satisfacción general'}};
const ratingDefs=[['hotelDesayuno','hotelBreakfast'],['hotelInstalacion','hotelFacilities'],['hotelServicio','hotelService'],['restCalidad','restaurantQuality'],['restServicio','restaurantService'],['guiaActitud','guideAttitude'],['satisfaccionGeneral','overall']];
const form=document.querySelector('#form'),ratings=document.querySelector('#ratings'),msg=document.querySelector('#message'),submit=document.querySelector('#submit'),success=document.querySelector('#success'),comments=document.querySelector('#comments');
let lang=(()=>{const p=new URLSearchParams(location.search).get('lang');if(I[p])return p;const s=localStorage.getItem('nimbusLang');if(I[s])return s;const n=(navigator.language||'en').toLowerCase();return n.startsWith('zh')?'zh':n.startsWith('ru')?'ru':n.startsWith('es')?'es':'en'})();
function t(k){return I[lang][k]||I.en[k]||k}function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){document.documentElement.lang=lang==='zh'?'zh-CN':lang;localStorage.setItem('nimbusLang',lang);document.querySelectorAll('[data-t]').forEach(e=>e.textContent=t(e.dataset.t));document.querySelectorAll('.langs button').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));const old=Object.fromEntries(ratingDefs.map(([n])=>[n,form.querySelector(`input[name="${n}"]:checked`)?.value||'']));ratings.innerHTML='';ratingDefs.forEach(([name,key])=>{const row=document.createElement('div');row.className='rating';row.innerHTML=`<div><span class="rating-title">${esc(t(key))}<span class="req">*</span></span></div><div class="stars">${[5,4,3,2,1].map(v=>`<input id="${name}${v}" type="radio" name="${name}" value="${v}" ${old[name]==v?'checked':''}><label for="${name}${v}" aria-label="${v} stars">★</label>`).join('')}</div><p class="error wide" data-e="${name}"></p>`;ratings.appendChild(row)});submit.textContent=t('submit')}
function clear(){document.querySelectorAll('.error').forEach(e=>e.textContent='');msg.className='message';msg.textContent=''}function error(name,text){const e=document.querySelector(`[data-e="${name}"]`);if(e)e.textContent=text}function validate(){clear();let ok=true;['groupCode','name','ciudades','itinerario'].forEach(n=>{if(!form.elements[n].value.trim()){error(n,t('required'));ok=false}});ratingDefs.forEach(([n])=>{if(!form.querySelector(`input[name="${n}"]:checked`)){error(n,t('ratingRequired'));ok=false}});if(!document.querySelector('#consent').checked){error('consent',t('consentRequired'));ok=false}return ok}
function id(){return crypto.randomUUID?crypto.randomUUID():`nimbus-${Date.now()}-${Math.random().toString(16).slice(2)}`}
document.querySelectorAll('.langs button').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;render()});comments.oninput=()=>document.querySelector('#count').textContent=comments.value.length;
form.onsubmit=async e=>{e.preventDefault();if(!validate())return;submit.disabled=true;submit.textContent=t('sending');const d=Object.fromEntries(new FormData(form).entries());delete d.website;Object.assign(d,{submissionId:id(),submittedAt:new Date().toISOString(),language:lang,formVersion:'1.0.0',sourceUrl:location.href.split('?')[0]});try{const r=await fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(d)});if(!r.ok)throw Error();form.style.display='none';success.classList.add('show');success.scrollIntoView({behavior:'smooth'})}catch(_){msg.textContent=t('network');msg.className='message show bad'}finally{submit.disabled=false;submit.textContent=t('submit')}};
document.querySelector('#again').onclick=()=>{form.reset();document.querySelector('#count').textContent='0';success.classList.remove('show');form.style.display='block';render();scrollTo({top:0,behavior:'smooth'})};document.querySelector('#year').textContent=new Date().getFullYear();render();
</script>
</body>
</html>
